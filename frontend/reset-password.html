<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Online Grocery Store</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="login-container">

    <!-- Left side image -->
    <div class="login-image">
        <img src="assets/login-side.jpeg" alt="Grocery Image">
    </div>

    <!-- Right side form -->
    <div class="login-form">

        <!-- Vertical box -->
        <div class="login-box">

            <!-- Logo / Back to home -->
            <a href="reset-password.html" class="logo">🛒 FreshCart</a>

            <h2>Reset Password</h2>

            <p style="font-size:14px; color:#555; margin-bottom:20px;">
                Enter your new password below.
            </p>

            <form>
                <label>New Password</label>
                <div class="password-box">
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                    <span class="toggle-eye" onclick="toggleNewPassword()">👁️</span>
                </div>

                <label>Confirm Password</label>
                <div class="password-box">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    <span class="toggle-eye" onclick="toggleConfirmPassword()">👁️</span>
                </div>

                <!-- UI-only action for now -->
                <button type="button" onclick="resetPassword()">
                     Update Password
                </button>

            </form>

            <p class="register-text">
                Back to
                <a href="login.html">Login</a>
            </p>

        </div>
    </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
