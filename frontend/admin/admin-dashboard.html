<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | FreshCart</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="admin-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="brand">🛒 FreshCart</h2>
        <p class="subtitle">Admin Panel</p>

        <nav>
    <a href="admin-dashboard.html" class="active">
        <span class="icon">📊</span>
        Dashboard
    </a>

    <a href="admin-categories.html">
        <span class="icon">🏷️</span> Categories
    </a>

    <a href="admin-products.html">
        <span class="icon">📦</span> Products
    </a>

    <a href="admin-users.html">
    <span class="icon">👥</span>
    Users
    </a>

    <a href="admin-orders.html">
    <span class="icon">🧾</span>
    Orders
    </a>

<a href="admin-feedback.html">
<span class="icon">⭐</span>
Feedback
</a>

    <a href="../login.html" class="logout">
        <span class="icon">🚪</span>
        Logout
    </a>
</nav>

    </aside>

    <!-- Main Content -->
    <main class="content">
        <h1>Admin Dashboard</h1>
        <p class="welcome">Welcome, Admin 👋</p>

        <div class="cards">

<!-- Users -->
<div class="card users">
    <div class="card-icon">👤</div>
    <div>
        <h3>Total Users</h3>
        <p id="totalUsers">0</p>
    </div>
</div>

<!-- Categories -->
<div class="card categories">
    <div class="card-icon">🗂️</div>
    <div>
        <h3>Total Categories</h3>
        <p id="totalCategories">0</p>
    </div>
</div>

<!-- Products -->
<div class="card products">
    <div class="card-icon">📦</div>
    <div>
        <h3>Total Products</h3>
        <p id="totalProducts">0</p>
    </div>
</div>

<!-- Orders -->
<div class="card orders">
    <div class="card-icon">🛒</div>
    <div>
        <h3>Total Orders</h3>
        <p id="totalOrders">0</p>
    </div>
</div>

<!-- Pending Orders -->
<div class="card pending">
    <div class="card-icon">⏳</div>
    <div>
        <h3>Pending Orders</h3>
        <p id="pendingOrders">0</p>
    </div>
</div>

<!-- Revenue -->
<div class="card revenue">
    <div class="card-icon">💰</div>
    <div>
        <h3>Total Revenue</h3>
        <p id="totalRevenue">₹0</p>
    </div>
</div>

</div>

    </main>

</div>
<script src="admin-dashboard.js"></script>
</body>
</html>
