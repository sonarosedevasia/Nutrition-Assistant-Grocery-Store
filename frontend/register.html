<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Online Grocery Store</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="login-container">

    <!-- Left side image -->
    <div class="login-image">
        <img src="assets/login-side.jpeg" alt="Grocery Image">
    </div>

    <!-- Right side form -->
    <div class="login-form">

        <!-- Vertical box -->
        <div class="login-box">

            <!-- Logo / Back to home -->
            <a href="register.html" class="logo">🛒 FreshCart</a>

            <h2>Create Account</h2>

            <p style="font-size:14px; color:#555; margin-bottom:20px;">
                Register to start shopping fresh groceries.
            </p>

            <form>

                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>

                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>

                <label>Contact Number</label>
                <input type="tel" placeholder="Enter your contact number" required>

                <label>Password</label>
                <div class="password-box">
                    <input type="password" id="regPassword" placeholder="Create password" required>
                    <span class="toggle-eye" onclick="toggleRegPassword()">👁️</span>
                </div>

                <label>Confirm Password</label>
                <div class="password-box">
                    <input type="password" id="regConfirmPassword" placeholder="Confirm password" required>
                    <span class="toggle-eye" onclick="toggleRegConfirmPassword()">👁️</span>
                </div>

                <!-- UI-only for now -->
                <button type="button" onclick="registerUser()">
                    Register
                </button>

            </form>

            <p class="register-text">
                Already have an account?
                <a href="login.html">Login here</a>
            </p>

        </div>
    </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
